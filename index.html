<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="TaskVoice">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#f4f6fa">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="icon" type="image/png" href="icon-192.png">
  <title>TaskVoice</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ══════════════════════════════════════════════════════════════════════
     SCREEN: Auth (login / magic link)
══════════════════════════════════════════════════════════════════════ -->
<div id="screen-auth" class="screen screen--active">
  <div class="auth-wrap">
    <div class="auth-logo">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8"  y1="23" x2="16" y2="23"/>
      </svg>
    </div>
    <h1 class="auth-app-name">TaskVoice</h1>
    <p id="auth-title" class="auth-title">Sign in to continue</p>
    <p id="auth-subtitle" class="auth-subtitle"></p>

    <div id="auth-form-wrap">
      <form id="auth-form" class="auth-form">
        <input type="email" id="auth-email" class="auth-input" placeholder="your@email.com"
               autocomplete="email" inputmode="email" required/>
        <button type="submit" id="auth-btn" class="auth-btn">Send Code</button>
      </form>
    </div>

    <div id="auth-otp-wrap" class="auth-sent hidden">
      <p class="auth-sent-title">Check your email</p>
      <p class="auth-sent-sub">Enter the 6-digit code we sent to <strong id="auth-otp-email"></strong></p>
      <form id="auth-otp-form" class="auth-form">
        <input type="text" id="auth-otp-input" class="auth-input auth-otp-input" placeholder="••••••"
               inputmode="numeric" autocomplete="one-time-code" maxlength="6" required/>
        <button type="submit" id="auth-otp-btn" class="auth-btn">Verify &amp; Sign In</button>
      </form>
      <button type="button" id="auth-otp-back" class="auth-text-btn">Use a different email</button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════════════════════
     SCREEN: Onboarding (name + role)
══════════════════════════════════════════════════════════════════════ -->
<div id="screen-onboarding" class="screen">
  <div class="auth-wrap">
    <div class="auth-logo">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8"  y1="23" x2="16" y2="23"/>
      </svg>
    </div>
    <h1 id="onboard-title" class="auth-title">Welcome to TaskVoice!</h1>
    <p class="auth-subtitle">Tell us a bit about yourself to get started.</p>

    <form id="onboard-form" class="auth-form">
      <label class="onboard-label" for="onboard-name">Your name</label>
      <input type="text" id="onboard-name" class="auth-input" placeholder="Full name…" autocomplete="name" required/>

      <div id="onboard-role-section" class="onboard-role-section">
        <label class="onboard-label">I am a…</label>
        <div class="role-cards">
          <label class="role-card">
            <input type="radio" name="role" value="assigner"/>
            <div class="role-card-body">
              <span class="role-card-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="26" height="26">
                  <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>
                </svg>
              </span>
              <span class="role-card-title">Manager</span>
              <span class="role-card-sub">I assign tasks to my team</span>
            </div>
          </label>
          <label class="role-card">
            <input type="radio" name="role" value="assignee"/>
            <div class="role-card-body">
              <span class="role-card-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="26" height="26">
                  <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
                </svg>
              </span>
              <span class="role-card-title">Team Member</span>
              <span class="role-card-sub">I receive and complete tasks</span>
            </div>
          </label>
        </div>
      </div>

      <button type="submit" id="onboard-btn" class="auth-btn" style="margin-top:8px">Continue</button>
    </form>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════════════════════
     SCREEN: Assigner App (3-page layout — Home, Tasks, Pipeline)
══════════════════════════════════════════════════════════════════════ -->
<div id="screen-assigner-app" class="screen">
  <div id="assigner-app" class="app-shell">

    <!-- ── Home page ────────────────────────────────────────────── -->
    <section id="page-home" class="page">
      <header class="page-header">
        <div class="page-header-title">
          <h1>Today</h1>
          <p id="home-date" class="page-header-sub"></p>
        </div>
        <button id="assigner-settings-btn" class="signout-btn" title="Settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </header>
      <main class="home-main">
        <div id="home-chips" class="summary-chips"></div>
        <div id="home-tasks"></div>
      </main>
      <div class="mic-dock">
        <div class="mic-wrapper">
          <button id="mic-btn" class="mic-btn" aria-label="Record task">
            <svg id="mic-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
              <line x1="12" y1="19" x2="12" y2="23"/>
              <line x1="8"  y1="23" x2="16" y2="23"/>
            </svg>
            <svg id="stop-icon" class="hidden" viewBox="0 0 24 24" fill="currentColor">
              <rect x="6" y="6" width="12" height="12" rx="2"/>
            </svg>
            <div id="mic-spinner" class="spinner hidden"></div>
          </button>
          <div class="mic-ring"></div>
        </div>
        <p id="mic-label" class="mic-label">Tap to speak a task</p>
      </div>
    </section>

    <!-- ── Tasks page ────────────────────────────────────────────── -->
    <section id="page-tasks" class="page">
      <header class="page-header"><h1>Tasks</h1></header>
      <main id="tasks-main" class="tasks-main"></main>
    </section>

    <!-- ── Pipeline page ─────────────────────────────────────────── -->
    <section id="page-pipeline" class="page">
      <header class="page-header">
        <h1>Team</h1>
        <button id="pipeline-pin-btn" class="header-pin-btn" title="Pin people">
          <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
            <path d="M16 9V4h1c.55 0 1-.45 1-1s-.45-1-1-1H7c-.55 0-1 .45-1 1s.45 1 1 1h1v5c0 1.66-1.34 3-3 3v2h5.97v7l1 1 1-1v-7H18v-2c-1.66 0-3-1.34-3-3z"/>
          </svg>
        </button>
        <button id="pipeline-edit-btn" class="header-edit-btn">Edit</button>
      </header>
      <div id="pin-select-panel" class="pin-select-panel hidden"></div>
      <div id="pipeline-tabs" class="pipeline-tabs"></div>
      <div id="add-person-area"></div>
      <main id="pipeline-main" class="pipeline-main"></main>

      <div id="pipeline-fab-backdrop" class="fab-backdrop"></div>
      <div id="add-task-sheet-slot"></div>
      <div id="pipeline-fab" class="fab-speed-dial hidden">
        <div class="fab-actions">
          <button class="fab-pill" data-fab-action="type">
            <span class="fab-pill-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
                <path d="M4 7V4h16v3"/><path d="M9 20h6"/><path d="M12 4v16"/>
              </svg>
            </span>
            Type
          </button>
          <button class="fab-pill" data-fab-action="speak">
            <span class="fab-pill-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                <line x1="12" y1="19" x2="12" y2="23"/>
                <line x1="8" y1="23" x2="16" y2="23"/>
              </svg>
            </span>
            Speak
          </button>
        </div>
        <button class="fab-trigger" aria-label="Add task">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
        <span class="fab-label" id="pipeline-fab-label">For …</span>
      </div>
    </section>

    <!-- Settings sheet (overlays the whole shell — accessible from any page) -->
    <div id="assigner-settings-sheet-slot"></div>

  </div><!-- .app-shell -->

  <!-- Assigner bottom nav -->
  <nav id="assigner-nav" class="bottom-nav">
    <button class="nav-btn" data-page="pipeline" style="position:relative">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      Team
      <span id="pipeline-badge" class="nav-badge" style="display:none"></span>
    </button>
    <button class="nav-btn" data-page="home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      Home
    </button>
    <button class="nav-btn" data-page="tasks">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
      </svg>
      Tasks
    </button>
  </nav>
</div>

<!-- ══════════════════════════════════════════════════════════════════════
     SCREEN: Assignee App (My Tasks)
══════════════════════════════════════════════════════════════════════ -->
<div id="screen-assignee-app" class="screen">
  <div id="assignee-app" class="app-shell">
    <section class="page page--active">
      <header class="page-header">
        <h1>My Tasks</h1>
        <button id="assignee-settings-btn" class="signout-btn" title="Settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </header>
      <div id="assignee-add-form-slot" class="assignee-add-form-slot"></div>
      <main id="assignee-main" class="tasks-main"></main>
      <div id="assignee-fab-backdrop" class="fab-backdrop"></div>
      <div id="assignee-fab" class="fab-speed-dial">
        <div class="fab-actions">
          <button class="fab-pill" data-fab-action="type">
            <span class="fab-pill-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
                <path d="M4 7V4h16v3"/><path d="M9 20h6"/><path d="M12 4v16"/>
              </svg>
            </span>
            Type
          </button>
          <button class="fab-pill" data-fab-action="speak">
            <span class="fab-pill-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                <line x1="12" y1="19" x2="12" y2="23"/>
                <line x1="8" y1="23" x2="16" y2="23"/>
              </svg>
            </span>
            Speak
          </button>
        </div>
        <button class="fab-trigger" aria-label="Add task">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
      </div>
    </section>
    <!-- Settings sheet -->
    <div id="assignee-settings-sheet-slot"></div>

  </div><!-- .app-shell -->

  <!-- Assignee bottom nav (minimal — just badge) -->
  <nav id="assignee-nav" class="bottom-nav">
    <button class="nav-btn nav-btn--active" style="position:relative">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
      </svg>
      My Tasks
      <span id="assignee-badge" class="nav-badge" style="display:none"></span>
    </button>
  </nav>
</div>

<!-- ── Voice capture overlay ──────────────────────────────────────────── -->
<div id="voice-overlay" class="voice-overlay hidden">
  <div id="voice-overlay-mic" class="voice-overlay-mic">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
      <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
      <line x1="12" y1="19" x2="12" y2="23"/>
      <line x1="8"  y1="23" x2="16" y2="23"/>
    </svg>
  </div>
  <p id="voice-overlay-text" class="voice-overlay-text">Listening…</p>
  <div id="voice-overlay-eq" class="voice-eq"><span></span><span></span><span></span></div>
  <div id="voice-overlay-result" class="task-preview voice-overlay-result hidden"></div>
  <div class="voice-overlay-footer">
    <button id="voice-overlay-stop" class="voice-overlay-stop" type="button">Stop Recording</button>
    <p id="voice-overlay-hint" class="voice-overlay-hint">Listening</p>
  </div>
</div>

<!-- ── Global toast ───────────────────────────────────────────────────── -->
<div id="toast" class="toast"></div>

<!-- Scripts: order matters — config → supabase client → modules → app -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="config.js"></script>
<script src="client.js"></script>
<script src="auth.js"></script>
<script src="invite.js"></script>
<script src="sync.js"></script>
<script src="storage.js"></script>
<script src="voice.js"></script>
<script src="tasks.js"></script>
<script src="parser.js"></script>
<script src="pipeline.js"></script>
<script src="assignee.js"></script>
<script src="notifications.js"></script>
<script src="app.js"></script>
</body>
</html>
